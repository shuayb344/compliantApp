name: complaint_app
description: "Complaint & Feedback Management System"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.8
  firebase_storage: ^12.4.4

  # State Management
  provider: ^6.1.5

  # Image Picking
  image_picker: ^1.1.2

  # Image Caching
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

  # Google Sign In (SSO)
  google_sign_in: ^6.2.2

  # Push Notifications
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^18.0.1
  
  # Charts
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
